<!-- index.html -->
<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS 붙이는 3가지 방법 (외부 · 내부 · 인라인)</title>
    <link rel="stylesheet" href="styles/main.css" />   <!-- ① 외부 -->
    <style>                            /* ② 내부 */
      p { color: green; }
    </style>
  </head>
  <body>
    <h1>3가지 방법</h1>
    <p>내부 스타일로 초록</p>
    <p style="color: red;">인라인으로 빨강</p>   <!-- ③ 인라인 -->
  </body>
</html>
