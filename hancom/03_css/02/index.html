<!DOCTYPE html>                     <!-- HTML5 문서 선언 (맨 첫 줄 고정) -->
<html lang="ko">                    <!-- 문서 시작 · 언어 한국어 -->
  <head>                            <!-- 화면 밖 설정 영역 -->
    <meta charset="UTF-8">          <!-- 한글이 깨지지 않게 인코딩 지정 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS란? 선택자 + 붙이는 법</title>
    <link rel="stylesheet" href="styles/main.css" />  <!-- ✨ 이 줄만 추가됨 — styles 폴더 main.css(꾸미기) 연결 -->
  </head>                           <!-- 설정 영역 끝 -->
  <body>                            <!-- 실제 화면에 보이는 내용 -->
    <h1>CSS 첫걸음</h1>                <!-- h1: 큰 제목 — main.css 규칙 → 빨강 -->
    <p>모든 p는 초록</p>               <!-- p: 문단 — 규칙 → 초록 -->
    <p class="special">이 줄만 주황</p>  <!-- class="special" 별명 → .special 규칙 → 주황 -->
    <ul>                            <!-- ul: 점(•) 목록 시작 -->
      <li>사과</li>                   <!-- li: 목록 한 칸 -->
      <li><em>바나나</em>는 보라</li>     <!-- em: 강조(기울임) — li em 규칙 → 보라 -->
    </ul>                           <!-- 목록 끝 -->
  </body>                           <!-- 내용 영역 끝 -->
