<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrap">
    <header class="header">
      
    </header>

    <div id="chatBox" class="chat-box">
      <div class="bubble ai">🤖안녕하세요! 🌟 ❤️ 😍 🦄 😊</div>
    </div>

    <div class="input-row">
      <textarea id="q" class="input" placeholder="질문을 입력하세요..." rows="1"></textarea>
      <button id="sendBtn" class="send-btn">보내기</button>
      <button id="resetBtn" class="reset-btn">초기화</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
