<!DOCTYPE html> <!--HTML 선언-->
<html lang="ko"> <!--HTML 페이지 시작 및 한국어 설정-->
<head> <!--화면에 보이지 않는 영역-->
    <meta charset="UTF-8"> <!--한글 깨지지 않도록-->
    <title>div</title> <!--브라우저 탭 이름-->
</head>
<body> <!--화면에 보이는 영역-->
    <!-- 한 덩어리로 묶기 -->
    <h1>MENU</h1>
    <div class="card"> <!--div : 뜻이 없는 빈 상자-->
        <img src="../02_html/lemon.jpg" width="200" alt="레몬"/>
        <h3>레몬에이드</h3>
        <p>9,000원</p>
        <form>
            <button type="submit"> 구매</button>
            <button type="submit"> 담기</button>
        </form>
    </div>
    <br>
    <div class="card"> 
        <img src="../02_html/grapefruit.jpg" width="200" alt="자몽"/>
        <h3>자몽에이드</h3>
        <p>9,200원</p>
        <form>
            <button type="submit"> 구매</button>
            <button type="submit"> 담기</button>
        </form>
    </div>
    <br>
    <div class="card"> 
        <img src="../02_html/latte.jpg" width="200" alt="카페라떼"/>
        <h3>카페라떼</h3>
        <p>5,500원</p>
        <form>
            <button type="submit"> 구매</button>
            <button type="submit"> 담기</button>
        </form>
    </div>
</body>
</html>
