<!DOCTYPE html> <!--HTML 선언-->
<html lang="ko"> <!--HTML 페이지 시작, 한글 설정-->
    <head> <!--화면에 보이지 않는 영역-->
        <meta charset="UTF-8"> <!--한글 안 깨지게-->
        <title>시맨틱 구조</title> <!--브라우저 탭 이름-->
    </head>
    <body> <!--화면에 보이는 영역-->
        <header>
            <h1>시맨틱 구조</h1>
            <nav> 홈 | 소개 | 연락처 </nav>
        </header>
        <!-- 본문, 중요한 내용 -->
        <main>
            <article> 
                <!--완결된 글 하나-->
            <section>
                    첫 번째 글 내용
                </article>
            </section>
        </main>
        <aside> <!--본문 옆 보조 내용-->
            곁다리 정보(사이드바)
        </aside>
        <footer>
            ⓒ 2026 내 사이트
        </footer>
    </body>
</html>

<!--
div는 뜻 없는 빈 상자
시맨틱 태그는 이름만 봐도 무슨 구역인지 드러남
핵심 : header, nav, main, section, article, aside, footer
-->
