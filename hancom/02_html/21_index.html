<!DOCTYPE html> <!--HTML 선언-->
<html lang="ko"> <!-- HTML 페이지 시작, 한국어 페이지-->
<head> <!--보이지 않는 영역-->
    <meta charset="UTF-8"> <!--한글 깨지지 않게-->
    <title>span</title> <!--브라우저 탭 이름-->
    <style>
        .good{
            color:brown;
            font-size: 30px;
            font-weight: bold;
        }
    </style>
</head>
<body> <!--실제 보이는 영역-->
    <h1>span</h1>
    <p>글자 중 <span class="good">여기만</span> 강조</p>
</body>
</html>
