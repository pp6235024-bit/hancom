<!DOCTYPE html><!--이건 html 문서야 라고 알려주기-->
<html lang = "ko"> <!--문서 시작, 한국어 페이지-->
    <head>          <!--화면엔 안 보이는 칸-->
        <meta charset="UTF-8"> <!--한글 안 깨지게-->
        <title>태그와 뼈대를 공부하자!</title> <!--브라우저 탭에 뜨는 이름-->
    </head>
    <body> <!--화면에 보이는 진짜 내용 칸-->
        <!--태그는 열기 + 닫기 한 쌍, 닫기를 빠뜨리면 화면이 깨짐-->
        <!-- 이들을 합쳐서 요소(element)라 부름-->
        <h1>안녕하세요!</h1> 
        <p>이것은 내용입니다.</p>
    </body>
</html>
<!-- 
- 요소(element) = 여는 태그 + 내용 + 닫는 태그
- 태그 이름은 대소문자 안 가림 (H1 = h1) 
-->
