<!DOCTYPE html> <!--HTML 문서-->
<html lang="ko"> <!--문서 시작, 한국어 페이지-->
<head> <!--화면에 안 보이는 준비 칸-->
    <meta charset="UTF-8"> <!--한글 안 깨지게-->
    <title>목록, 시맨틱 태그</title> <!--브라우저 탭에 뜨는 이름-->
</head>
<body> <!--화면애 보이는 진짜 내용 칸-->
    <!-- 페이지 맨 위 구역 -->
    <header>맨 위 (로고 혹은 제목)</header>
    <!-- 페이지 핵심 내용 구역 -->
    <main>
        <!-- 목록 -->
        <ul>
            <li>좋아하는 것 : 영화</li>
            <li>취미 : 산책</li>
            <li>목표 : 웹 개발자</li>
        </ul>
    </main>
    <!-- 페이지 맨 아래 구역 -->
    <footer>맨 아래 (저작권 혹은 연락처)</footer>
</body>
</html>

<!-- 시맨틱 : 의미가 있는 태그 -->
