<!-- 강조와 중첩 -->

<!DOCTYPE html> <!-- HTML 문서 시작-->
<html lang="ko"> <!-- 문서 시작, 한국어 페이지-->
<head>           <!-- 화면엔 안 보이는 준비 칸 -->
    <meta charset="UTF-8"> <!--한글 안 깨지게-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>강조와 중첩</title> <!--브라우저 탭에 뜨는 이름-->
</head>
<body> <!--화면에 보이는 진짜 내용 칸-->
    <!-- 중첩 : 태그 안에 태그 넣기 / strong은 글자를 굵게 강조 -->
    <p>
        &lt;저는 <strong>개발하는 것</strong>을 좋아합니다!&gt;<br>
        &amp;안녕하세요! &lt; <br>
        <>&
        <!-- 엔티티 출력은 잘 됨 권장사항임! -->
    </p>
</body>
</html>
