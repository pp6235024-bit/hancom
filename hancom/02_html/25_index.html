<!DOCTYPE html> <!--HTML 선언-->
<html lang="ko"> <!--HTML 페이지 시작, 한국어 설정-->
    <head> <!--화면에 보이지 않는 영역-->
        <meta charset="UTF-8"> <!--한글 안 깨지게-->
        <title>글자 꾸미기</title> <!--브라우저 탭 이름-->
    </head>
    <body> <!--화면에 실제로 보이는 영역-->
        <h1>글자 꾸미기</h1>
        <p><em>기울임 강조</em></p> <!--em : 글자 기울임-->
        <p><mark>형광펜 입니다.</mark></p> <!--mark : 노란 형광펜 효과-->
        <p><small>작게 쓰는 글씨</small></p> <!--small : 글자를 작게-->
        <p><code>print("hi")</code></p> <!--code : 코드처럼 보이는 글씨-->
        <blockquote>인용 덩어리</blockquote> <!--blockquote : 인용하는 칸-->
        <p>H<sub>2</sub>0</p> <!--sub : 아래첨자 (작게 아래로)-->
        <p>X<sub>2</sub></p> <!--sup : 위첨자 (작게 위로)-->
    </body>
</html>
