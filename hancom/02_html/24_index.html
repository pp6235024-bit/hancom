<!DOCTYPE html> <!--HTML 선언-->
<html lang="ko"> <!--HTML 페이지 시작, 한국어 설정-->
    <head> <!--보이지 않는 영역-->
        <meta charset="UTF-8"> <!--한글 깨지지 않게-->
        <title>입력 Type</title> <!--브라우저 탭 이름-->
    </head>
    <body> <!--실제 보이는 영역-->
        <h1>입력 Type</h1>
        <form>
            <label>이메일 : <input type="email" placeholder="메일"></label>
            <br>
            <label>비밀번호 : <input type="password"></label>
            <br>
            <label>동의 : <input type="checkbox"></label>
            <br>
            <label>성별 : <input type="radio" name="gender">남</label>
            <label><input type="radio" name="gender">여</label>
            <br>
            <label>날짜 : <input type="date"></label>
            <br><br>
            <textarea rows="5" cols="30">긴 글 칸</textarea>
            <br>
            <label>지역 : 
                <select>
                    <optgroup label="서울">
                    <option>강남</option>
                    <option>종로</option>
                    <option>마포</option>
                    </optgroup>
                    <optgroup label="부산">
                    <option>해운대</option>
                    <option>서면</option>
                    <option>광안리</option>
                    </optgroup>
                    <optgroup label="경주">
                    <option>불국사</option>
                    <option>첨성대</option>
                    <option>동궁과 월지</option>
                    </optgroup>
                </select>
            </label>
            <br>
            <label>만족도 : <input type="range" min="0" max="10"></label>
            <br><br>
            <input type="reset" value="초기화">
            <br><br>
            <meter value="6" min="0" max="10"></meter>
        </form>
    </body>
</html>
