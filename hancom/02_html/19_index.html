<!DOCTYPE html> <!--HTML 페이지 선언-->
<html lang="ko"> <!--HTML 문서 시작, 한국어 페이지-->
<head> <!--보이지 않는 영역-->
    <meta charset="UTF-8"> <!--한글 깨지지 않게-->
    <title>id</title> <!--브라우저 탭 이름-->
</head>
<body> <!-- 화면에 보이는 영역-->
    <nav>
        <a href="#top">TOP</a>
        <a href="#mid">MIDDLE</a>
    </nav>
    <h1 id="top">맨 위 제목</h1>
    <p id="mid">id가 뭘까요~~~?</p>
</body>
</html>

<!-- id = 페이지에 딱 하나 뿐인 이름표(고유성을 가지고 있음), 같은 값을 두번 쓰면 안 됨 -->
<!-- class 선택자는 . id 선택자는 # -->
<!-- class 속성은 CSS에서, id 속성은 JS에서 많이 사용됨 -->
<!-- css 적용 시에는 class를 사용하는 것이 권장됨 -->
<!-- id와 class 사이에는 우선순위가 있음, id가 class보다 우선적으로 수행됨. -->
