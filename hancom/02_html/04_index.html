<!DOCTYPE html>             <!--"이건 HTML 문서야" 선언 -->
<html lang="ko">            <!-- 문서 시작, 한국어 페이지 -->
<head>                      <!-- 화면엔 안 보이는 칸 -->
    <meta charset="UTF-8">  <!-- 한글 안 깨지게-->
    <title>주석 연습</title> <!--브라우저 탭에 뜨는 이름-->
</head>
<body>
    <!-- 이건 메모예요. 화면에 안 보입니다.-->
    <h1>안녕하세요!</h1>
    <!--Shft + Alt + ↓를 누르면 줄이 복사됩니다.-->
    <p>이것은 내용입니다.</p>
    <p>this is a content</p>
    <p>this is p tag</p>
    <p>이것도 내용입니다.</p>
    <!-- ctrl+/을 누르면 선택한 줄이 주석처리됩니다.  -->
    <!-- <p>이것은 내용입니다.</p> -->
 
</body>
</html>
