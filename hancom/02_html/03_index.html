<!DOCTYPE html>                         <!-- "이건 HTML 문서야" 선언 -->
<html lang="ko">                        <!-- 문서 시작, 한국어 페이지 -->
<head>                                  <!-- 화면엔 안 보이는 준비 칸 -->
    <meta charset="UTF-8">              <!-- 한글 안 깨지게-->
    <title>한컴 강의</title>
    <style>
        
        .box {
            border: 1px solid #6e6e6e;
            padding: 10px;
            margin : 10px;
            background-color: #a7a7a7;
        }
        .inner-box {
            border: 1px solid #6e6e6e;
            padding: 10px;
            margin : 10px;
            background-color: #e7e7e7;
        }
        .inner-box:hover {
            background-color: #414141;
            color : white;
            transition: 0.5s ease;
        }
    </style>
</head>
<body>                                  <!-- 화면에 보이는 진짜 내용 칸-->
    <h1>                                <!-- 큰 제목 한 줄 -->
        안녕하세요! 제 첫 웹페이지입니다.   
    </h1> 
    <h2>안녕하세요!</h2>
    <p> 반갑습니다!</p>
    <table border = "1">
        <tr>
            <th>이름</th>
            <th>나이</th>
            <th>성별</th>
        </tr>
        <tr>
            <th>김민수</th>
            <th>25</th>
            <th>남성</th>
        </tr>
    </table>
    <div class = "box">
        <div class = "inner-box">
            <h2>this is a heading in a div element</h2>
            <p>this is some text in a div element</p>
        </div>
        
    </div>
</body>
</html>                                 <!-- 문서 끝 -->
